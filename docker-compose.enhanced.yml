services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "5300:53/tcp"
      - "5300:53/udp"
      - "8080:80/tcp"
      - "8443:443/tcp"
    environment:
      - TZ=${TZ:-America/Chicago}
      - FTLCONF_dns_reply_host_IPv4=${LOCAL_IPV4}
      - FTLCONF_dns_upstreams=unbound#53
      - FTLCONF_dns_dnssec=true
      - FTLCONF_dns_listeningMode=all
      - FTLCONF_dns_dnsmasq_lines=dns-forward-max=500
    volumes:
      - pihole_config:/etc/pihole
      - pihole_dnsmasq:/etc/dnsmasq.d
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    depends_on:
      unbound:
        condition: service_healthy
    networks:
      - pihole_net
    healthcheck:
      test: ["CMD", "dig", "+norecurse", "+retry=0", "@127.0.0.1", "pi.hole"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s


  unbound:
    container_name: unbound
    image: mvance/unbound:latest
    restart: unless-stopped
    networks:
      - pihole_net
    healthcheck:
      test: ["CMD-SHELL", "drill google.com @127.0.0.1 -p 53 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s


  dnsproxy:
    container_name: dnsproxy
    image: adguard/dnsproxy:latest
    entrypoint: ["/opt/dnsproxy/dnsproxy"]
    command: ["-u", "https://1.1.1.1/dns-query", "-u", "https://1.0.0.1/dns-query", "-p", "5054", "-l", "0.0.0.0", "--cache"]
    restart: unless-stopped
    networks:
      - pihole_net


  pihole-exporter:
    container_name: pihole-exporter
    image: ekofr/pihole-exporter:latest
    environment:
      - PIHOLE_HOSTNAME=pihole
      - PIHOLE_PASSWORD=${PIHOLE_PASSWORD}
      - INTERVAL=30s
      - PORT=9617
    ports:
      - "9617:9617"
    restart: unless-stopped
    depends_on:
      - pihole
    networks:
      - pihole_net


volumes:
  pihole_config:
  pihole_dnsmasq:


networks:
  pihole_net:
    driver: bridge